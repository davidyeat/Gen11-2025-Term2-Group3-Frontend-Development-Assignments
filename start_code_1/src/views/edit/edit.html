<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../css/edit.css">
    <link rel="stylesheet" href="../../css/navbar.css">
    <title>Edit Questions</title>
    <!-- Boxicons CSS -->
    <link href='https://cdn.boxicons.com/3.0.6/fonts/basic/boxicons.min.css' rel='stylesheet'>
    <link href='https://cdn.boxicons.com/3.0.6/fonts/brands/boxicons-brands.min.css' rel='stylesheet'>
</head>
<body>
    <!-- Navbar ----------------------------------------------->
    <div class="edit-container">
        <div class="quiz-container">
            <nav class="navbar">
                <div class="logo">
                    <img src="../../assets/logo.png" alt="Quiz Logo">
                    <h1>Quiz App</h1>
                </div>
                <ul>
                    <li><a href="../edit/edit.html" class="active" id="edit">Edit Quiz</a></li>
                    <li><a href="../play/play.html" id="play">Play Quiz</a></li>
                </ul>
            </nav>
        </div>

        <!-- Edit Content -------------------------------------->
        <div class="edit-content">
            <div class="edit-header">
                <button id="add-question-btn">Add Question</button>
            </div>
            <div id="question-list">
                <div class="question-item">
                    <p>What does HTML stand for?</p>
                    <div class="features">
                        <i class='bxr bx-edit edit-question'></i> 
                        <i class='bxr bx-trash delete-question'></i> 
                    </div>
                </div>

                <div class="question-item">
                    <p>What does CSS stand for?</p>
                    <div class="features">
                        <i class='bxr bx-edit edit-question'></i> 
                        <i class='bxr bx-trash delete-question'></i> 
                    </div>
                </div>

                <div class="question-item">
                    <p>What does JavaScript stand for?</p>
                    <div class="features">
                        <i class='bxr bx-edit edit-question'></i> 
                        <i class='bxr bx-trash delete-question'></i> 
                    </div>
                </div>
            </div>
        </div>

        <!-- Popup for Adding Question -------------------------->
        <div id="addQuiz-container" style="display: none;">
          <h2>Create New Question</h2>

          <form action="#" class="questionForm">
            <div class="question-input">
              <label for="title">Title</label>
              <input type="text" id="title" placeholder="Question title" required>
            </div>

            <h3>Answers</h3>

            <div class="answer-item">
              <input id="answerA" type="text" placeholder="Answer A" required>
              <span class="check-icon">&#10003;</span>
            </div>

            <div class="answer-item">
              <input id="answerB" type="text" placeholder="Answer B" required>
              <span class="check-icon">&#10003;</span>
            </div>

            <div class="answer-item">
              <input id="answerC" type="text" placeholder="Answer C" required>
              <span class="check-icon">&#10003;</span>
            </div>

            <div class="answer-item">
              <input id="answerD" type="text" placeholder="Answer D" required>
              <span class="check-icon">&#10003;</span>
            </div>
          </form>
          <div class="toggle-btn">
            <button id="create-btn">Create</button>
            <button id="cancel-btn">Cancel</button>
          </div>
        </div>


    </div>
    <script type="module" src="edit.js"></script>
</body>
</html>
